# Redirect HTTP -> HTTPS for both FE/BE domains
server {
    listen 80;
    server_name lawyerai.click api.lawyerai.click;
    return 301 https://$host$request_uri;
}

# Frontend: https://lawyerai.click
server {
    listen 443 ssl http2;
    server_name lawyerai.click;

    # SSL cert for FE domain
    # ssl_certificate /etc/letsencrypt/live/lawyerai.click/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/lawyerai.click/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://lawyerai-ui-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

# Backend API: https://api.lawyerai.click
server {
    listen 443 ssl http2;
    server_name api.lawyerai.click;

    # SSL cert for API domain
    # ssl_certificate /etc/letsencrypt/live/api.lawyerai.click/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.lawyerai.click/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Keep /api prefix when proxying to backend.
    location / {
        proxy_pass http://lawyerai-api-prod:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Optional: direct static upload serving from shared volume
    location /upload/ {
        alias /usr/share/nginx/html/uploads/store/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";

        location ~* \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }
}