services:
  lawyerai-api:
    container_name: lawyerai-api-prod
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPLOAD_DIR=${UPLOAD_DIR}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env

  lawyerai-queue:
    container_name: lawyerai-queue-prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: ["node", "dist/queue.js"]
    restart: unless-stopped
    env_file:
      - ./backend/.env

  lawyerai-schedule:
    container_name: lawyerai-schedule-prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: ["node", "dist/schedule.js"]
    restart: unless-stopped
    env_file:
      - ./backend/.env

  lawyerai-ui:
    container_name: lawyerai-ui-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        API_BASE_URL_SERVER: ${API_BASE_URL_SERVER}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    depends_on:
      - lawyerai-api
    restart: unless-stopped
    env_file:
      - ./frontend/.env

  nginx:
    image: nginx:alpine
    container_name: lawyerai-nginx
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - lawyerai-api
      - lawyerai-ui
